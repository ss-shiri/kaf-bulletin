name: update

# Crawls, archives, and publishes to GitHub Pages in one pass.
#
# On cadence: GitHub caps scheduled workflows at a five minute minimum and
# silently drops anything faster; scheduled runs also routinely sit in a queue
# for 5 to 30 minutes. Anything below roughly an hour is theatre. Four runs a
# day is honest, polite to the upstream, and ample for a bulletin.

on:
  schedule:
    - cron: "17 */6 * * *"    # 4x daily; odd offset avoids the contended :00 slot
  workflow_dispatch:           # use this for the first print
  push:
    branches: [main]
    paths: ["index.html", "config/**", ".github/workflows/update.yml"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kaf-bulletin
  cancel-in-progress: false    # never cancel mid-write

jobs:
  print:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Offline suite, runs in a scratch tree. No network, so an upstream
      # change cannot break it, and it cannot touch the real archive.
      - name: Test
        run: python scripts/selftest.py

      # Always crawl. An earlier version skipped this on push, which meant
      # the very first deploy shipped an empty site with no way to tell why.
      - name: Crawl
        run: python scripts/ingest.py

      # Runs only when the crawl produced no archive, and says exactly which
      # of the four possible causes you have instead of leaving a blank page.
      - name: Diagnose (only if empty)
        if: always()
        run: |
          if [ ! -f data/latest.json ]; then
            echo "::warning::no data/latest.json after crawl, running diagnostics"
            python scripts/diagnose.py || true
          fi

      - name: Commit archive
        run: |
          git config user.name  "kaf-bulletin-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data state
          if git diff --staged --quiet; then
            echo "nothing new this run"
          else
            git commit -m "set: $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi

      # Publish only what the browser needs. Uploading the repo root would
      # ship the crawler and the git history to a public web root.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/data
          rm -f _site/data/.gitkeep
          ls -la _site _site/data

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
